set_se_schedule:
  name: Set SE light schedule
  description: >-
    Write the full multi-period, weekday-aware schedule to a Spider Farmer
    SE-series light. Used by the Spider Light card; can also be called from
    automations.
  fields:
    entity_id:
      name: Light
      description: The SE light (or any of its entities) to write the schedule to.
      required: true
      selector:
        entity:
          integration: sf
          domain: light
    periods:
      name: Periods
      description: >-
        List of schedule periods. Each period is a mapping with keys: days
        (list of 0-6, 0=Sunday), start ("HH:MM"), end ("HH:MM"), brightness
        (11-100), fade (sunrise/sunset minutes, 0-30), enabled (0 or 1).
      required: true
      example: >-
        [{"enabled": 1, "days": [0, 1, 2, 3, 4, 5, 6], "start": "08:00",
        "end": "20:00", "brightness": 50, "fade": 15}]
      selector:
        object:

set_outlet_schedule:
  name: Set outlet Time Slot schedule
  description: >-
    Write an outlet's Time Slot schedule (up to 12 weekday-aware on/off slots)
    to a Spider Farmer power strip / display panel. Used by the tent card's
    Outlets tab; can also be called from automations.
  fields:
    entity_id:
      name: Outlet
      description: Any entity of the outlet to schedule (e.g. its switch or mode).
      required: true
      selector:
        entity:
          integration: sf
    periods:
      name: Slots
      description: >-
        List of up to 12 time slots. Each is a mapping with keys: days (list of
        0-6, 0=Sunday), start ("HH:MM"), end ("HH:MM").
      required: true
      example: >-
        [{"days": [1, 3, 5], "start": "08:00", "end": "20:00"}]
      selector:
        object:

set_alarm_settings:
  name: Set alarm thresholds
  description: >-
    Write the controller's alarm threshold settings (climate, substrate, and
    other-device alerts). Used by the tent card's Alerts tab; can also be
    called from automations.
  fields:
    entity_id:
      name: Controller
      description: Any entity of the controller whose alarms to set (e.g. its Alarm Settings sensor).
      required: true
      selector:
        entity:
          integration: sf
    settings:
      name: Settings
      description: >-
        The decoded threshold groups {climate, substrate, other}. Each metric
        is a mapping with key, enabled (0/1), and max/min (temps in °F).
      required: true
      selector:
        object:


apply_bundle:
  name: Apply settings bundle
  description: >-
    Commit several staged sub-settings to one device module (fan, blower,
    heater, humidifier, dehumidifier, light, light2) as a single
    block-preserving write. Used by the tent card's Save buttons; can also be
    called from automations.
  fields:
    entity_id:
      name: Device entity
      description: Any entity of the device to write to (e.g. its mode select).
      required: true
      selector:
        entity:
          integration: sf
    module:
      name: Module
      description: "The device module to write: fan, blower, heater, humidifier, dehumidifier, light, light2 (light_1/light_2 accepted)."
      required: true
      selector:
        text:
    settings:
      name: Settings
      description: >-
        Mapping of sub-setting keys to values, e.g. {"mode": "Cycle",
        "cycle_start": "08:00", "cycle_times": 4}.
      required: true
      selector:
        object:
